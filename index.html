<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ankit Portfolio</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI,sans-serif;
}

body{
    background:#0f172a;
    color:white;
}

nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 10%;
    background:#111827;
}

.logo{
    font-size:24px;
    font-weight:bold;
    color:#38bdf8;
}

nav ul{
    display:flex;
    list-style:none;
}

nav ul li{
    margin-left:20px;
}

.hero{
    text-align:center;
    padding:120px 20px;
}

.hero h1{
    font-size:55px;
}

.hero span{
    color:#38bdf8;
}

.hero p{
    margin-top:15px;
    color:#cbd5e1;
}

.btn{
    display:inline-block;
    margin-top:25px;
    padding:12px 25px;
    background:#38bdf8;
    color:black;
    text-decoration:none;
    border-radius:8px;
    font-weight:bold;
}

.section{
    padding:80px 10%;
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.card{
    background:#1e293b;
    padding:25px;
    border-radius:12px;
}

footer{
    text-align:center;
    padding:20px;
    background:#111827;
}
</style>
</head>

<body>

<nav>
    <div class="logo">Ankit.dev</div>
    <ul>
        <li>Home</li>
        <li>Skills</li>
        <li>Projects</li>
        <li>Contact</li>
    </ul>
</nav>

<section class="hero">
    <h1>Hello, I'm <span>Ankit</span></h1>
    <p>Web Developer • Video Editor • YouTuber</p>
    <a href="#" class="btn">Contact Me</a>
</section>

<section class="section">
    <h2>My Skills</h2>
    <br>
    <div class="cards">
        <div class="card">HTML</div>
        <div class="card">CSS</div>
        <div class="card">JavaScript</div>
        <div class="card">Video Editing</div>
    </div>
</section>

<section class="section">
    <h2>Projects</h2>
    <br>
    <div class="cards">
        <div class="card">Portfolio Website</div>
        <div class="card">YouTube Channel Website</div>
        <div class="card">Future E-Commerce Site</div>
    </div>
</section>

<footer>
    <p>© 2026 Ankit Portfolio</p>
</footer>

</body>
</html>
